openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Web Dev Blog Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Blog post operations
  - name: categories
    description: Category operations
  - name: auth
    description: Authentication operations
  - name: stats
    description: Analytics and statistics
  - name: comments
    description: Comment operations
  - name: newsletter
    description: Newsletter subscription operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List blog posts
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [draft, published, all] }
        - name: page
          in: query
          schema: { type: integer }
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostList"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/featured:
    get:
      operationId: getFeaturedPosts
      tags: [posts]
      summary: Get featured/recent published posts for homepage
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Featured posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/slug/{slug}:
    get:
      operationId: getPostBySlug
      tags: [posts]
      summary: Get a published post by its URL slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    patch:
      operationId: updatePost
      tags: [posts]
      summary: Update a post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /posts/{id}/publish:
    patch:
      operationId: togglePostPublish
      tags: [posts]
      summary: Toggle a post published/draft status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishToggle"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{id}/view:
    post:
      operationId: incrementPostView
      tags: [posts]
      summary: Increment post view count
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: View count updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ViewCount"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/slug/{slug}:
    get:
      operationId: getCategoryBySlug
      tags: [categories]
      summary: Get a category by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Get current auth status
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Get blog-wide analytics overview
      responses:
        "200":
          description: Stats overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/posts:
    get:
      operationId: getPostStats
      tags: [stats]
      summary: Get per-post view statistics, sorted by views
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Post statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostStat"

  /comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a post
      parameters:
        - name: postId
          in: query
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Create a comment on a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /newsletter/subscribe:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      summary: Subscribe to the newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscriber"

  /newsletter/subscribers:
    get:
      operationId: listSubscribers
      tags: [newsletter]
      summary: List newsletter subscribers (admin)
      responses:
        "200":
          description: Subscribers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsletterSubscriber"

  /sitemap:
    get:
      operationId: getSitemap
      tags: [posts]
      summary: Get sitemap data for SEO
      responses:
        "200":
          description: Sitemap entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SitemapEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Post:
      type: object
      required: [id, title, slug, content, status, views, createdAt, updatedAt]
      properties:
        id: { type: integer }
        title: { type: string }
        slug: { type: string }
        content: { type: string }
        excerpt: { type: ["string", "null"] }
        featuredImage: { type: ["string", "null"] }
        status: { type: string, enum: [draft, published] }
        categoryId: { type: ["integer", "null"] }
        categoryName: { type: ["string", "null"] }
        categorySlug: { type: ["string", "null"] }
        seoTitle: { type: ["string", "null"] }
        metaDescription: { type: ["string", "null"] }
        views: { type: integer }
        readingTime: { type: ["integer", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    PostList:
      type: object
      required: [posts, total, page, limit]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }

    PostInput:
      type: object
      required: [title, content]
      properties:
        title: { type: string, minLength: 1 }
        slug: { type: string }
        content: { type: string }
        excerpt: { type: string }
        featuredImage: { type: string }
        status: { type: string, enum: [draft, published] }
        categoryId: { type: integer }
        seoTitle: { type: string }
        metaDescription: { type: string }

    PostUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        slug: { type: string }
        content: { type: string }
        excerpt: { type: string }
        featuredImage: { type: string }
        status: { type: string, enum: [draft, published] }
        categoryId: { type: ["integer", "null"] }
        seoTitle: { type: string }
        metaDescription: { type: string }

    PublishToggle:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [draft, published] }

    ViewCount:
      type: object
      required: [views]
      properties:
        views: { type: integer }

    Category:
      type: object
      required: [id, name, slug, postCount, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        postCount: { type: integer }
        createdAt: { type: string }

    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string }
        description: { type: string }

    CategoryUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        slug: { type: string }
        description: { type: string }

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    AuthStatus:
      type: object
      required: [authenticated]
      properties:
        authenticated: { type: boolean }
        username: { type: ["string", "null"] }

    StatsOverview:
      type: object
      required: [totalPosts, publishedPosts, draftPosts, totalViews, totalCategories, totalSubscribers, totalComments]
      properties:
        totalPosts: { type: integer }
        publishedPosts: { type: integer }
        draftPosts: { type: integer }
        totalViews: { type: integer }
        totalCategories: { type: integer }
        totalSubscribers: { type: integer }
        totalComments: { type: integer }

    PostStat:
      type: object
      required: [id, title, slug, views, status, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        slug: { type: string }
        views: { type: integer }
        status: { type: string }
        categoryName: { type: ["string", "null"] }
        createdAt: { type: string }

    Comment:
      type: object
      required: [id, postId, authorName, content, createdAt]
      properties:
        id: { type: integer }
        postId: { type: integer }
        authorName: { type: string }
        authorEmail: { type: ["string", "null"] }
        content: { type: string }
        createdAt: { type: string }

    CommentInput:
      type: object
      required: [postId, authorName, content]
      properties:
        postId: { type: integer }
        authorName: { type: string }
        authorEmail: { type: string }
        content: { type: string }

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email: { type: string }
        name: { type: string }

    NewsletterSubscriber:
      type: object
      required: [id, email, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        name: { type: ["string", "null"] }
        createdAt: { type: string }

    SitemapEntry:
      type: object
      required: [url, type, updatedAt]
      properties:
        url: { type: string }
        type: { type: string }
        updatedAt: { type: string }
